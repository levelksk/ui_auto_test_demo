version: '3.8'

services:
  midscene-test:
    image: xulingfeng/midscene-test-platform:latest
    container_name: midscene-test-platform
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./midscene_run:/app/midscene_run
      - ./screenshots:/app/screenshots
    restart: unless-stopped

version: '3.8'

services:
  midscene-test:
    image: xulingfeng/midscene-test-platform:latest
    container_name: midscene-test-platform
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./midscene_run:/app/midscene_run
      - ./screenshots:/app/screenshots
    shm_size: '2gb'
    dns:
      - 223.5.5.5
      - 8.8.8.8
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    restart: unless-stopped
